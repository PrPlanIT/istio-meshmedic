apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: istio-spiffe-reconciler-scan
rules:
  # Enumerate ambient-enrolled pods cluster-wide and correlate to nodes
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Exec into ztunnel pods to query localhost:15000/config_dump
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Namespace + node metadata for context (node name, labels)
  - apiGroups: [""]
    resources: ["namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
