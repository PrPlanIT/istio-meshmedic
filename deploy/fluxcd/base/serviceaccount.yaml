apiVersion: v1
kind: ServiceAccount
metadata:
  name: istio-meshmedic
  # Deploy into your istio (data-plane) namespace — it is already privileged for
  # ztunnel/istio-cni, so the agent's hostPID+root needs no extra PSS relaxation
  # and you avoid weakening a shared app namespace. Adjust to match your install.
  namespace: istio-system
